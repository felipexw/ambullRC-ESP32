; PlatformIO project configuration
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Plain `pio run`/upload targets only the firmware env. `native` is for
; `pio test -e native` and doesn't build src/main.cpp (Arduino-only code).
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
; Pinned explicitly: this Mac exposes several unrelated /dev/cu.* devices
; (Bluetooth, other UART bridges), so auto-detect can pick the wrong one.
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001
monitor_speed = 115200
; Reconnect the monitor across the upload-triggered reset so boot-time
; prints (e.g. the servo's initial-position log) aren't missed.
monitor_rts = 0
monitor_dtr = 0
; ESP32Servo (not the stock Arduino Servo lib) is required because the ESP32
; drives servos via its LEDC PWM peripheral, which the stock lib doesn't support.
lib_deps = madhephaestus/ESP32Servo@^3.0.5

[env:native]
; Host-only environment for unit/integration tests (Constitution Principle II:
; tests must run without a physical ESP32).
platform = native
test_framework = unity
; Compile src/*.cpp (Protocol/Control layers) alongside the tests, excluding
; main.cpp (Arduino-only entry point — the native platform has no framework
; hook to auto-exclude it the way embedded platforms do).
test_build_src = yes
build_src_filter = +<*> -<main.cpp>
