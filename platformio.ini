; PlatformIO project configuration
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Plain `pio run`/upload targets only the firmware env. `native` is for
; `pio test -e native` and doesn't build src/main.cpp (Arduino-only code).
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

[env:native]
; Host-only environment for unit/integration tests (Constitution Principle II:
; tests must run without a physical ESP32).
platform = native
test_framework = unity
; Compile src/*.cpp (Protocol/Control layers) alongside the tests, excluding
; main.cpp (Arduino-only entry point — the native platform has no framework
; hook to auto-exclude it the way embedded platforms do).
test_build_src = yes
build_src_filter = +<*> -<main.cpp>
