; PlatformIO project configuration
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

[env:native]
; Host-only environment for unit/integration tests (Constitution Principle II:
; tests must run without a physical ESP32).
platform = native
test_framework = unity
